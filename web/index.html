<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>RemoteVoice 语音输入</title>
  <link rel="manifest" href="/manifest.json" />
  <!-- iOS 不读 manifest 图标、也不支持 SVG 主屏图标，必须用不透明的 apple-touch-icon PNG -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <!-- 连接态 -->
    <header class="topbar">
      <span id="connState" class="badge badge-off">未连接</span>
      <span id="peerState" class="badge badge-muted">等待 Mac</span>
      <button id="settingsBtn" class="icon-btn" aria-label="设置">⚙</button>
    </header>

    <!-- 配对面板 -->
    <section id="pairPanel" class="panel">
      <h1>RemoteVoice</h1>
      <p class="hint">在 Mac 菜单栏点「配对 / 设备…」，用手机相机扫一扫即可配对。配过一次后，以后自动连接，无需再扫。</p>
      <button id="scanBtn" class="btn btn-primary">扫一扫</button>
      <div class="code-fallback">
        <span class="code-fallback-hint">扫不了？输入 Mac 上的 4 位数字码</span>
        <div class="code-row">
          <input id="codeInput" class="code-input4" inputmode="numeric" maxlength="4" placeholder="0000" autocomplete="off" />
          <button id="codePairBtn" class="btn">配对</button>
        </div>
      </div>
      <p id="pairMsg" class="msg"></p>
      <div id="scanBox" class="scan-box hidden">
        <video id="scanVideo" playsinline muted></video>
        <button id="scanCancel" class="btn">取消</button>
      </div>
    </section>

    <!-- 主面板（配对成功后） -->
    <section id="talkPanel" class="panel hidden">
      <div class="live">
        <p id="partial" class="partial">按住下方按钮说话</p>
        <p id="final" class="final"></p>
      </div>
      <div class="talk-stage">
        <span class="talk-pulse" aria-hidden="true"></span>
        <span class="talk-pulse d2" aria-hidden="true"></span>
        <button id="talkBtn" class="talk-btn" aria-label="按住说话">
          <span class="talk-glow" aria-hidden="true"></span>
          <span class="talk-core">
            <svg class="talk-mic" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="12" rx="3"></rect>
              <path d="M5 11a7 7 0 0 0 14 0"></path>
              <line x1="12" y1="18" x2="12" y2="22"></line>
            </svg>
            <span id="talkLabel" class="talk-label">按住说话</span>
          </span>
        </button>
      </div>
      <div class="status-line">
        <span id="llmFlag" class="badge badge-muted">标点纠错：开</span>
        <span id="levelMeter" class="meter"><i></i></span>
      </div>
    </section>

    <!-- 设置面板 -->
    <section id="settingsPanel" class="panel hidden">
      <h2>设置</h2>
      <label class="row">
        <span>服务器地址</span>
        <input id="relayInput" placeholder="wss://host/ws" />
      </label>
      <label class="row switch">
        <span>LLM 标点纠错</span>
        <input id="llmSwitch" type="checkbox" checked />
      </label>
      <button id="settingsClose" class="btn">完成</button>
    </section>
  </main>

  <script src="/app.js" type="module"></script>
  <script src="/sw-register.js" defer></script>
</body>
</html>
