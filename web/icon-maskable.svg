<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RemoteVoice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset=".55" stop-color="#5b54e6"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".3" r=".7">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".25"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe4ff"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#221a66" flood-opacity=".30"/>
    </filter>
  </defs>

  <!-- 满幅背景：maskable 由系统自行裁形，四角不能透明 -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- 内容落在中心 80% 安全圈内 -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M330 168 Q374 256 330 344" stroke-width="15" stroke-opacity=".92"/>
    <path d="M182 168 Q138 256 182 344" stroke-width="15" stroke-opacity=".92"/>
    <path d="M356 138 Q420 256 356 374" stroke-width="14" stroke-opacity=".5"/>
    <path d="M156 138 Q92 256 156 374" stroke-width="14" stroke-opacity=".5"/>
  </g>
  <g filter="url(#sh)">
    <rect x="214" y="116" width="84" height="176" rx="42" fill="url(#mic)"/>
    <path d="M178 250 a78 78 0 0 0 156 0" fill="none" stroke="url(#mic)" stroke-width="18" stroke-linecap="round"/>
    <rect x="246" y="322" width="20" height="48" rx="10" fill="url(#mic)"/>
    <rect x="206" y="372" width="100" height="20" rx="10" fill="url(#mic)"/>
  </g>
</svg>
