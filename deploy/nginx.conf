# RemoteVoice 中继 nginx 反向代理配置
#
# 作用：
#   - 终结 TLS（手机麦克风要求安全上下文 wss/https）
#   - 托管 PWA 静态站（/）
#   - 反代 WebSocket（/ws → 本机 :8787）
#
# 用法：
#   1) 域名替换 voice.example.com
#   2) 证书用 certbot 申请（见 deploy.sh）
#   3) 拷到 /etc/nginx/sites-available/remotevoice 并 ln -s 到 sites-enabled
#   4) nginx -t && systemctl reload nginx

# WebSocket 长连接所需的 upgrade map（放 http 块）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name voice.example.com;
    # 仅用于 certbot 验证 + 跳转 https
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name voice.example.com;

    # 证书路径（certbot 默认）
    ssl_certificate     /etc/letsencrypt/live/voice.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voice.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ---- PWA 静态站 ----
    root /opt/remotevoice/web;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        # Service Worker 不缓存
        location = /sw.js        { add_header Cache-Control "no-cache"; }
        location ~* \.(html|js|css|svg|json|webmanifest)$ {
            add_header Cache-Control "no-cache";
        }
    }

    # ---- WebSocket 反代到中继 ----
    location /ws {
        proxy_pass http://127.0.0.1:8787/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 长连接：关掉各类超时（PTT 会话可能持续）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # 健康检查（可选，直接走静态/中继）
    location = /healthz {
        proxy_pass http://127.0.0.1:8787/healthz;
    }
}
